        async loadLocalFonts() {
          try {
            if (!window.queryLocalFonts) {
              showToast("您的浏览器不支持Font Access API，请使用Chrome或Edge最新版");
              return;
            }
            const fonts = await window.queryLocalFonts();
            if (fonts.length === 0) {
              showToast("未找到本地字体");
              return;
            }
            const fontSelect = document.getElementById("prop-font-family");
            const existingFonts = new Set();
            for (let i = 0; i < fontSelect.options.length; i++) existingFonts.add(fontSelect.options[i].value);
            let addedCount = 0;
            fonts.forEach((font) => {
              const fontName = font.family;
              if (!existingFonts.has(fontName)) {
                const option = document.createElement("option");
                option.value = fontName;
                option.text = font.fullName || fontName;
                option.style.fontFamily = fontName;
                fontSelect.appendChild(option);
                existingFonts.add(fontName);
                addedCount++;
              }
            });
            if (addedCount > 0) showToast(`成功加载 ${addedCount} 个本地字体`);
            else showToast("所有本地字体已存在列表中");
          } catch (error) {
            console.error("加载本地字体失败:", error);
            if (error.name === "NotAllowedError") showToast("字体访问被拒绝，请在浏览器设置中允许字体访问权限");
            else showToast("加载本地字体失败: " + error.message);
          }
        },
        bindDesignViewportEvents() {
          const viewport = document.getElementById("viewport-container");
          viewport.addEventListener(
            "wheel",
            (e) => {
              if (this.state.mode !== "design") return;
              e.preventDefault();
              const delta = e.deltaY > 0 ? 0.9 : 1.1;
              this.setDesignZoom(this.state.designZoom * delta);
            },
            { passive: false },
          );
          viewport.addEventListener("mousedown", (e) => {
            if (this.state.mode !== "design") return;
            if (e.target.id === "viewport-container") {
              this.canvas.discardActiveObject();
              this.canvas.requestRenderAll();
            }
            if (e.button === 1) {
              this.state.isDesignPanning = true;
              this.state.lastMouseX = e.clientX;
              this.state.lastMouseY = e.clientY;
              viewport.style.cursor = "grabbing";
              e.preventDefault();
            }
          });
          window.addEventListener("mousemove", (e) => {
            if (this.state.isDesignPanning) {
              const dx = e.clientX - this.state.lastMouseX;
              const dy = e.clientY - this.state.lastMouseY;
              this.state.lastMouseX = e.clientX;
              this.state.lastMouseY = e.clientY;
              this.state.designPanX += dx;
              this.state.designPanY += dy;
              this.applyDesignTransform();
            }
          });
          window.addEventListener("mouseup", () => {
            if (this.state.isDesignPanning) {
              this.state.isDesignPanning = false;
              viewport.style.cursor = "default";
            }
          });
          document.getElementById("btn-zoom-in").onclick = () => this.setDesignZoom(this.state.designZoom * 1.2);
          document.getElementById("btn-zoom-out").onclick = () => this.setDesignZoom(this.state.designZoom * 0.8);
          document.getElementById("btn-zoom-fit").onclick = () => this.resetDesignViewport();
        },
        setDesignZoom(val) {
          val = Math.max(0.1, Math.min(val, 5));
          this.state.designZoom = val;
          document.getElementById("zoom-level").innerText = Math.round(val * 100) + "%";
          this.updateCanvasDisplaySize();
          this.applyDesignTransform();
        },
        resetDesignViewport() {
          this.state.designZoom = 1;
          this.state.designPanX = 0;
          this.state.designPanY = 0;
          this.setDesignZoom(1);
        },
        updateCanvasDisplaySize() {
          const zoom = this.state.designZoom;
          const baseW = this.state.ticketSize.w * MM_TO_PX;
          const baseH = this.state.ticketSize.h * MM_TO_PX;
          this.canvas.setDimensions({ width: baseW * zoom, height: baseH * zoom });
          this.canvas.setZoom(zoom);
          const canvasArea = document.getElementById("canvas-area");
          canvasArea.style.width = baseW * zoom + "px";
          canvasArea.style.height = baseH * zoom + "px";
          this.canvas.requestRenderAll();
        },
        applyDesignTransform() {
          const el = document.getElementById("canvas-area");
          el.style.transform = `translate(calc(-50% + ${this.state.designPanX}px), calc(-50% + ${this.state.designPanY}px))`;
        },
        bindPreviewViewportEvents() {
          const viewport = document.getElementById("preview-viewport");
          viewport.addEventListener(
            "wheel",
            (e) => {
              if (this.state.mode !== "preview") return;
              e.preventDefault();
              const delta = e.deltaY > 0 ? 0.9 : 1.1;
              this.state.previewZoom = Math.max(0.1, Math.min(this.state.previewZoom * delta, 5));
              this.applyPreviewTransform();
            },
            { passive: false },
          );
          viewport.addEventListener("mousedown", (e) => {
            if (this.state.mode !== "preview") return;
            this.state.isPreviewPanning = true;
            this.state.lastMouseX = e.clientX;
            this.state.lastMouseY = e.clientY;
            viewport.style.cursor = "grabbing";
            e.preventDefault();
          });
          window.addEventListener("mousemove", (e) => {
            if (this.state.isPreviewPanning) {
              const dx = e.clientX - this.state.lastMouseX;
              const dy = e.clientY - this.state.lastMouseY;
              this.state.lastMouseX = e.clientX;
              this.state.lastMouseY = e.clientY;
              this.state.previewPanX += dx;
              this.state.previewPanY += dy;
              this.applyPreviewTransform();
            }
          });
          window.addEventListener("mouseup", () => {
            if (this.state.isPreviewPanning) {
              this.state.isPreviewPanning = false;
              viewport.style.cursor = "grab";
            }
          });
        },
        applyPreviewTransform() {
          const layer = document.getElementById("preview-transform-layer");
          layer.style.transform = `translate(${this.state.previewPanX}px, ${this.state.previewPanY}px) scale(${this.state.previewZoom})`;
        },
        bindHistoryEvents() {
          this.canvas.on("object:added", () => this.saveHistory());
          this.canvas.on("object:modified", () => this.saveHistory());
          this.canvas.on("object:removed", () => this.saveHistory());
        },
        saveHistory() {
          if (this.state.isHistoryProcessing) return;
          const json = JSON.stringify(
            this.canvas.toJSON([
              "isSerial",
              "serialRules",
              "excludeFromExport",
              "baseRadius",
              "strokeUniform",
              "isCurvedText",
              "curvedText",
              "curvedRadius",
              "curvedSpacing",
              "curvedCenterAngle",
              "curvedFontSize",
              "curvedFontFamily",
              "curvedFontWeight",
              "curvedFill",
              "charSpacing",
              "lineHeight",
              "underline",
            ]),
          );
          if (this.state.historyIndex < this.state.history.length - 1) {
            this.state.history = this.state.history.slice(0, this.state.historyIndex + 1);
          }
          this.state.history.push(json);
          this.state.historyIndex++;
          if (this.state.history.length > this.state.maxHistory) {
            this.state.history.shift();
            this.state.historyIndex--;
          }
          this.updateUndoRedoState();
        },
        undo() {
          if (this.state.historyIndex > 0) {
            this.state.isHistoryProcessing = true;
            this.state.historyIndex--;
            const json = JSON.parse(this.state.history[this.state.historyIndex]);
            this.canvas.loadFromJSON(json, () => {
              this.state.isHistoryProcessing = false;
              this.canvas.renderAll();
              this.updateUndoRedoState();
            });
          }
        },
        redo() {
          if (this.state.historyIndex < this.state.history.length - 1) {
            this.state.isHistoryProcessing = true;
            this.state.historyIndex++;
            const json = JSON.parse(this.state.history[this.state.historyIndex]);
            this.canvas.loadFromJSON(json, () => {
              this.state.isHistoryProcessing = false;
              this.canvas.renderAll();
              this.updateUndoRedoState();
            });
          }
        },
        updateUndoRedoState() {
          const btnUndo = document.getElementById("btn-undo");
          const btnRedo = document.getElementById("btn-redo");
          if (btnUndo) btnUndo.disabled = this.state.historyIndex <= 0;
          if (btnRedo) btnRedo.disabled = this.state.historyIndex >= this.state.history.length - 1;
        },
        toggleFullscreen() {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch((err) => showToast(`无法进入全屏: ${err.message}`));
          } else {
            if (document.exitFullscreen) document.exitFullscreen();
          }
        },
        flipObject(direction) {
          const obj = this.canvas.getActiveObject();
          if (!obj) {
            showToast("请先选择一个对象");
            return;
          }
          if (direction === "x") obj.set("flipX", !obj.flipX);
          else if (direction === "y") obj.set("flipY", !obj.flipY);
          obj.setCoords();
          this.canvas.requestRenderAll();
          this.saveHistory();
        },
        groupSelection() {
          const activeObj = this.canvas.getActiveObject();
          if (!activeObj || activeObj.type !== "activeSelection") {
            if (!activeObj) {
              showToast("请先框选多个对象");
            }
            return;
          }
          activeObj.toGroup();
          this.canvas.requestRenderAll();
          this.saveHistory();
        },

        ungroupSelection() {
          const activeObj = this.canvas.getActiveObject();
          if (!activeObj || activeObj.type !== "group") {
            if (activeObj && activeObj.isCurvedText) {
              showToast("环形文字不可解组");
              return;
            }
            showToast("请选择一个组进行解组");
            return;
          }
          activeObj.toActiveSelection();

          this.canvas.requestRenderAll();
          this.saveHistory();
        },
        alignObjects(alignment) {
          const activeObjects = this.canvas.getActiveObjects();
          if (activeObjects.length < 2) return;

          // 计算边界
          let minX = Infinity,
            maxX = -Infinity,
            minY = Infinity,
            maxY = -Infinity;
          let totalWidth = 0,
            totalHeight = 0;

          activeObjects.forEach((o) => {
            const bound = o.getBoundingRect();
            if (bound.left < minX) minX = bound.left;
            if (bound.left + bound.width > maxX) maxX = bound.left + bound.width;
            if (bound.top < minY) minY = bound.top;
            if (bound.top + bound.height > maxY) maxY = bound.top + bound.height;
            totalWidth += bound.width;
            totalHeight += bound.height;
          });

          activeObjects.forEach((o) => {
            const bound = o.getBoundingRect();
            switch (alignment) {
              case "left":
                o.set("left", minX + bound.width / 2);
                break;
              case "center":
                o.set("left", (minX + maxX) / 2);
                break;
              case "right":
                o.set("left", maxX - bound.width / 2);
                break;
              case "top":
                o.set("top", minY + bound.height / 2);
                break;
              case "middle":
                o.set("top", (minY + maxY) / 2);
                break;
              case "bottom":
                o.set("top", maxY - bound.height / 2);
                break;
            }
            o.setCoords();
          });
          this.canvas.requestRenderAll();
          this.saveHistory();
        },
        distributeObjects(type) {
          const activeObjects = this.canvas.getActiveObjects();
          if (activeObjects.length < 2) return;

          // 按中心点排序
          if (type === "horizontal") activeObjects.sort((a, b) => a.getCenterPoint().x - b.getCenterPoint().x);
          else activeObjects.sort((a, b) => a.getCenterPoint().y - b.getCenterPoint().y);

          const first = activeObjects[0].getCenterPoint();
          const last = activeObjects[activeObjects.length - 1].getCenterPoint();
          const step = type === "horizontal" ? (last.x - first.x) / (activeObjects.length - 1) : (last.y - first.y) / (activeObjects.length - 1);

          activeObjects.forEach((o, i) => {
            if (type === "horizontal") o.set("left", first.x + i * step);
            else o.set("top", first.y + i * step);
            o.setCoords();
          });
          this.canvas.requestRenderAll();
          this.saveHistory();
        },

        _updateDefaultTicketCount() {
          const hasSerials = this.canvas.getObjects().some((o) => o.isSerial);
          const totalInput = document.getElementById("cfg-print-total");
          if (!hasSerials) {
            const { rows, cols } = this.state.layout;
            totalInput.value = rows * cols;
          }
        },
        _extractFromDOM(schemaGroup) {
          const res = {};
          schemaGroup.forEach((item) => {
            const el = document.getElementById(item.id);
            if (el) {
              let val = el.value;
              if (item.type === "int") val = parseInt(val) || 0;
              else if (item.type === "float") val = parseFloat(val) || 0;
              res[item.key] = val;
            }
          });
          return res;
        },
        _applyToDOM(schemaGroup, dataSource) {
          if (!dataSource) return;
          schemaGroup.forEach((item) => {
            const el = document.getElementById(item.id);
            if (el) {
              let val = dataSource[item.key];
              if (val === undefined || val === null) val = item.default;
              if (val !== undefined) el.value = val;
            }
          });
        },
        updateLayout: debounce(function () {
          this._doUpdateLayout();
          if (this.state.mode === "preview") this.generatePreview();
        }, 100),
        _doUpdateLayout() {
          const getVal = (id) => parseFloat(document.getElementById(id)?.value) || 0;
          const getStr = (id) => document.getElementById(id).value;
          const sizeType = getStr("cfg-paper-size");
          const orient = getStr("cfg-paper-orient");
          let paperW, paperH;
          if (sizeType === "custom") {
            paperW = Math.max(10, getVal("cfg-paper-width"));
            paperH = Math.max(10, getVal("cfg-paper-height"));
          } else {
            const p = PAPERS[sizeType];
            paperW = p.w;
            paperH = p.h;
          }
          if (orient === "l") [paperW, paperH] = [paperH, paperW];
          this.state.paperSize = { w: paperW, h: paperH };
          this.state.layout = {
            rows: Math.max(1, getVal("cfg-rows")),
            cols: Math.max(1, getVal("cfg-cols")),
            marginT: getVal("cfg-margin-top"),
            marginB: getVal("cfg-margin-bottom"),
            marginL: getVal("cfg-margin-left"),
            marginR: getVal("cfg-margin-right"),
            gapX: getVal("cfg-gap-x"),
            gapY: getVal("cfg-gap-y"),
          };
          const { rows, cols, marginT, marginB, marginL, marginR, gapX, gapY } = this.state.layout;
          const availW = paperW - marginL - marginR - (cols - 1) * gapX;
          const availH = paperH - marginT - marginB - (rows - 1) * gapY;
          const ticketW = Math.max(10, availW / cols);
          const ticketH = Math.max(10, availH / rows);
          this.state.ticketSize = { w: ticketW, h: ticketH };
          this.updateCanvasDisplaySize();
          document.getElementById("info-paper-size").innerText = `${sizeType === "custom" ? "自定义" : sizeType}: ${paperW}x${paperH}mm | 单张: ${ticketW.toFixed(1)}x${ticketH.toFixed(1)}mm`;
          this._updateDefaultTicketCount();
          this.renderCanvasExtras();
        },
        renderCanvasExtras() {
          const oldBorder = this.canvas.getObjects().find((o) => o.id === "system-border");
          if (oldBorder) this.canvas.remove(oldBorder);
          const presetId = document.getElementById("cfg-border-preset").value;
          const preset = BORDER_PRESETS.find((p) => p.id === presetId);
          if (!preset || preset.id === "none") {
            this.canvas.requestRenderAll();
            return;
          }
          const padMM = parseFloat(document.getElementById("cfg-padding").value) || 0;
          const pad = padMM * MM_TO_PX;
          const ticketW = this.state.ticketSize.w * MM_TO_PX;
          const ticketH = this.state.ticketSize.h * MM_TO_PX;
          const scalePercent = parseFloat(document.getElementById("cfg-border-scale").value) || 100;
          const scaleFactor = scalePercent / 100;
          const targetW = Math.max(10, ticketW - pad * 2);
          const targetH = Math.max(10, ticketH - pad * 2);
          const colorHex = document.getElementById("cfg-border-color").value;
          const tintColor = colorHex;
          const generator = new SvgBorderGenerator();

          generator
            .generateFromSVG(preset.src, preset.w * scaleFactor, preset.h * scaleFactor, { width: targetW, height: targetH }, preset.slice, preset.mode, tintColor, 6)
            .then((pngBase64) => {
              fabric.Image.fromURL(pngBase64, (img) => {
                if (!img) {
                  console.error("Failed to load PNG image from base64.");
                  return;
                }
                img.set({ scaleX: targetW / img.width, scaleY: targetH / img.height });
                img.set({
                  id: "system-border",
                  left: pad,
                  top: pad,
                  selectable: false,
                  evented: false,
                  excludeFromExport: true,
                  originX: "left",
                  originY: "top",
                });
                this.canvas.add(img);
                this.canvas.sendToBack(img);
                this.canvas.requestRenderAll();
                if (this.state.mode === "preview") this.generatePreview();
              });
            })
            .catch((error) => {
              console.error("Error generating or loading border:", error);
              showToast(`加载边框失败: ${error.message}`);
            });
        },
        initAssets() {
          const container = document.getElementById("asset-grid");
          container.innerHTML = "";
          fetch("./assets/assets.json")
            .then((r) => r.json())
            .then((mockAssets) => {
              mockAssets.forEach((asset) => {
                const blob = new Blob([asset.svg], { type: "image/svg+xml" });
                const url = URL.createObjectURL(blob);
                const div = document.createElement("div");
                div.className = "asset-item";
                div.title = asset.name;
                div.innerHTML = `<img src="${url}" />`;
                div.onclick = () => this.addSvgAsset(url, asset.svg);
                container.appendChild(div);
              });
            })
            .catch(() => {
              container.innerHTML = '<div class="text-center text-muted py-4 small">无法加载素材。</div>';
            });
        },
        print() {
          this.state.mode = "preview";
          document.getElementById("mode-preview").checked = true;
          this.changeView();
          setTimeout(window.print, 300);
        },
        addSvgAsset(url, svgContent) {
          fabric.loadSVGFromURL(url, (objects, options) => {
            const svgGroup = fabric.util.groupSVGElements(objects, options);
            svgGroup.set({
              left: this.getCanvasCenter().x,
              top: this.getCanvasCenter().y,
              isAsset: true,
              originX: "center",
              originY: "center",
            });
            const targetW = 20 * MM_TO_PX;
            svgGroup.scaleToWidth(targetW);
            this._setAssetColor(svgGroup, "#000000");
            this.canvas.add(svgGroup);
            this.canvas.setActiveObject(svgGroup);
            this.canvas.requestRenderAll();
            const tabBtn = document.getElementById("tab-props-btn");
            const tabInst = bootstrap.Tab.getOrCreateInstance(tabBtn);
            tabInst.show();
          });
        },
        _setAssetColor(obj, color) {
          if (obj.isAsset) {
            obj.assetColor = color;
            if (obj.type === "group") {
              obj.getObjects().forEach((child) => {
                if (child.fill && child.fill !== "none") child.set("fill", color);
                if (child.stroke && child.stroke !== "none") child.set("stroke", color);
              });
            } else {
              obj.set("fill", color);
            }
          }
        },
        bindEvents() {
          const layoutInputs = [
            "cfg-margin-top",
            "cfg-margin-bottom",
            "cfg-margin-left",
            "cfg-margin-right",
            "cfg-rows",
            "cfg-cols",
            "cfg-gap-x",
            "cfg-gap-y",
            "cfg-border-style",
            "cfg-border-color",
            "cfg-padding",
            "cfg-print-total",
            "cfg-show-cutlines",
            "cfg-paper-width",
            "cfg-paper-height",
            "cfg-border-preset",
            "cfg-border-scale",
          ];
          const presetSelect = document.getElementById("cfg-border-preset");
          BORDER_PRESETS.forEach((p) => {
            const opt = document.createElement("option");
            opt.value = p.id;
            opt.text = p.name;
            presetSelect.appendChild(opt);
          });
          layoutInputs.forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.addEventListener("input", () => this.updateLayout());
          });
          const paperSizeSel = document.getElementById("cfg-paper-size");
          const customDimsDiv = document.getElementById("custom-paper-dims");
          paperSizeSel.addEventListener("change", () => {
            if (paperSizeSel.value === "custom") customDimsDiv.style.display = "flex";
            else customDimsDiv.style.display = "none";
            this.updateLayout();
          });
          const paperOrientSel = document.getElementById("cfg-paper-orient");
          paperOrientSel.addEventListener("change", () => {
            if (paperSizeSel.value === "custom") {
              const wIn = document.getElementById("cfg-paper-width");
              const hIn = document.getElementById("cfg-paper-height");
              const temp = wIn.value;
              wIn.value = hIn.value;
              hIn.value = temp;
            }
            this.updateLayout();
          });
          const bgInput = document.getElementById("cfg-canvas-bg");
          if (bgInput) {
            bgInput.addEventListener("input", (e) => {
              this.canvas.backgroundColor = e.target.value;
              this.canvas.requestRenderAll();
              if (this.state.mode === "preview") this.updateLayout();
            });
          }

          const modeRadios = document.getElementsByName("app-mode");
          modeRadios.forEach((radio) => {
            radio.addEventListener("change", (e) => {
              this.state.mode = e.target.value;
              this.changeView();
            });
          });
          const bindBtn = (id, fn) => {
            const btn = document.getElementById(id);
            if (btn) btn.onclick = fn.bind(this);
          };
          bindBtn("tool-add-text", this.addText);
          bindBtn("tool-add-serial", this.addSerial);
          bindBtn("tool-add-curved-text", this.addCurvedText);
          bindBtn("tool-add-line", this.addLine);
          bindBtn("tool-add-rect", this.addRect);
          bindBtn("tool-add-circle", this.addCircle);
          bindBtn("tool-add-triangle", this.addTriangle);
          bindBtn("tool-add-diamond", this.addDiamond);
          bindBtn("tool-add-star", this.addStar);
          bindBtn("btn-save-project", this.saveProject);
          bindBtn("btn-open-project", this.openProject);
          bindBtn("btn-export-pdf", this.exportPDF);
          bindBtn("btn-export-img", this.exportImage);
          bindBtn("btn-fit-canvas", this.fitImageToCanvas);
          bindBtn("btn-load-font", this.loadLocalFonts);
          bindBtn("btn-print", this.print);
          bindBtn("btn-fullscreen", this.toggleFullscreen);

          // 支持作者按钮
          bindBtn("btn-support", () => {
            const supportModal = new bootstrap.Modal(document.getElementById("supportModal"));
            supportModal.show();
          });

          // Undo/Redo
          bindBtn("btn-undo", this.undo);
          bindBtn("btn-redo", this.redo);

          // Group/Ungroup
          bindBtn("btn-group", this.groupSelection);
          bindBtn("btn-ungroup", this.ungroupSelection);

          // Align/Distribute
          bindBtn("btn-align-left", () => this.alignObjects("left"));
          bindBtn("btn-align-center-h", () => this.alignObjects("center"));
          bindBtn("btn-align-right", () => this.alignObjects("right"));
          bindBtn("btn-align-top", () => this.alignObjects("top"));
          bindBtn("btn-align-middle", () => this.alignObjects("middle"));
          bindBtn("btn-align-bottom", () => this.alignObjects("bottom"));
          bindBtn("btn-distribute-h", () => this.distributeObjects("horizontal"));
          bindBtn("btn-distribute-v", () => this.distributeObjects("vertical"));

          // Flip
          bindBtn("btn-flip-x", () => this.flipObject("x"));
          bindBtn("btn-flip-y", () => this.flipObject("y"));

          const fileInput = document.getElementById("file-upload-img");
          if (fileInput) {
            fileInput.onchange = (e) => {
              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                  const canvasW = this.state.ticketSize.w * MM_TO_PX;
                  const canvasH = this.state.ticketSize.h * MM_TO_PX;
                  const scaleX = (canvasW * 0.9) / img.width;
                  const scaleY = (canvasH * 0.9) / img.height;
                  const scale = Math.min(scaleX, scaleY);
                  img.scale(scale);
                  img.set({
                    left: this.getCanvasCenter().x,
                    top: this.getCanvasCenter().y,
                    originX: "center",
                    originY: "center",
                  });
                  this.canvas.add(img);
                  this.canvas.setActiveObject(img);
                  e.target.value = "";
                  this._updateDefaultTicketCount();
                });
              };
              reader.readAsDataURL(file);
            };
          }

          const viewport = document.getElementById("viewport-container");
          viewport.addEventListener("mouseenter", () => {
            this.state.isMouseInViewport = true;
          });

          viewport.addEventListener("mouseleave", () => {
            this.state.isMouseInViewport = false;
          });

          document.addEventListener(
            "keydown",
            (e) => {
              if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT" || e.target.isContentEditable) {
                console.log(3);

                return;
              }

              if (App.state.mode !== "design") return;
              const isCtrlOrCmd = e.ctrlKey || e.metaKey;
              const key = e.key.toLowerCase();

              if (isCtrlOrCmd && key === "c") {
                if (this.state.isMouseInViewport) {
                  if (App.copy()) {
                    e.preventDefault();
                    e.stopPropagation();
                  }
                }
                return;
              }

              if (isCtrlOrCmd && key === "v") {
                if (this.state.isMouseInViewport) {
                  if (App.paste()) {
                    e.preventDefault();
                    e.stopPropagation();
                  }
                }
                return;
              }

              if (this.state.isMouseInViewport && isCtrlOrCmd && key === "z") {
                e.preventDefault();
                if (e.shiftKey) this.redo();
                else this.undo();
                return;
              }

              if (this.state.isMouseInViewport && isCtrlOrCmd && key === "y") {
                e.preventDefault();
                this.redo();
                return;
              }

              if (this.state.isMouseInViewport && (key === "delete" || key === "backspace")) {
                App.deleteActiveObject();
                e.preventDefault();
                return;
              }

              if (this.state.isMouseInViewport && ["arrowup", "arrowdown", "arrowleft", "arrowright"].includes(key)) {
                const active = App.canvas.getActiveObject();
                if (!active) return;
                e.preventDefault();
                const step = e.shiftKey ? 10 : 1;
                if (key === "arrowup") active.top -= step;
                if (key === "arrowdown") active.top += step;
                if (key === "arrowleft") active.left -= step;
                if (key === "arrowright") active.left += step;
                active.setCoords();
                App.canvas.requestRenderAll();
              }
            },
            { capture: false },
          );

          this.canvas.on("mouse:down", (e) => {
            if (e.target === null) {
              this.canvas.discardActiveObject();
              this.canvas.requestRenderAll();
            }
          });
        },
        changeView() {
          const designArea = document.getElementById("workspace-design");
          const previewArea = document.getElementById("workspace-preview");
          const sidebarRight = document.querySelector(".sidebar-right");
          if (this.state.mode === "preview") {
            designArea.style.display = "none";
            previewArea.style.display = "flex";
            sidebarRight.style.display = "none";
            this.generatePreview();
          } else {
            previewArea.style.display = "none";
            designArea.style.display = "flex";
            sidebarRight.style.display = "flex";
            this.canvas.calcOffset();
            this.updateCanvasDisplaySize();
            this.canvas.requestRenderAll();
          }
        },
        addText() {
          const text = new fabric.IText("双击编辑文本", {
            left: this.getCanvasCenter().x,
            top: this.getCanvasCenter().y,
            fontFamily: "Microsoft YaHei",
            fontSize: 16,
            fill: "#333333",
            charSpacing: 0,
            lineHeight: 1.16,
            originX: "center",
            originY: "center",
          });
          this.canvas.add(text);
          this.canvas.setActiveObject(text);
          this._updateDefaultTicketCount();
        },
        addSerial() {
          const serial = new fabric.IText("No.0001", {
            left: this.getCanvasCenter().x,
            top: this.getCanvasCenter().y,
            fontFamily: "Arial",
            fontSize: 16,
            fill: "#dc3545",
            fontWeight: "bold",
            isSerial: true,
            serialRules: { prefix: "No.", suffix: "", start: 1, step: 1, digits: 4, repeat: 1 },
            charSpacing: 0,
            lineHeight: 1.16,
            originX: "center",
            originY: "center",
            editable: false,
          });
          this.canvas.add(serial);
          this.canvas.setActiveObject(serial);
          this._updateDefaultTicketCount();
        },
        addCurvedText() {
          const canvasW = this.canvas.width;
          const canvasH = this.canvas.height;
          const defaultRadius = Math.min(canvasW, canvasH) * 0.4;
          const curvedText = new CurvedText("环形文字示例", {
            left: this.getCanvasCenter().x,
            top: this.getCanvasCenter().y,
            radius: defaultRadius,
            spacing: 12,
            centerAngle: 270,
            fontSize: 20,
            fontFamily: "Microsoft YaHei",
            fontWeight: "bold",
            fill: "#333333",
            originX: "center",
            originY: "center",
          });
          this.canvas.add(curvedText);
          this.canvas.setActiveObject(curvedText);
          this._updateDefaultTicketCount();
        },
        addRect() {
          const rect = new fabric.Rect({
            left: this.getCanvasCenter().x,
            top: this.getCanvasCenter().y,
            width: 60,
            height: 40,
            fill: "transparent",
            stroke: "#333333",
            strokeWidth: 1,
            strokeUniform: true,
            rx: 0,
            ry: 0,
            baseRadius: 0,
            strokeDashArray: null,
            originX: "center",
            originY: "center",
          });
          this.canvas.add(rect);
          this.canvas.setActiveObject(rect);
        },
        addCircle() {
          const circle = new fabric.Circle({
            left: this.getCanvasCenter().x,
            top: this.getCanvasCenter().y,
            radius: 30,
            fill: "transparent",
            stroke: "#333333",
            strokeWidth: 1,
            strokeUniform: true,
            originX: "center",
            originY: "center",
          });
          this.canvas.add(circle);
          this.canvas.setActiveObject(circle);
        },
        addTriangle() {
          const triangle = new fabric.Triangle({
            left: this.getCanvasCenter().x,
            top: this.getCanvasCenter().y,
            width: 60,
            height: 60,
            fill: "transparent",
            stroke: "#333333",
            strokeWidth: 1,
            strokeUniform: true,
            originX: "center",
            originY: "center",
          });
          this.canvas.add(triangle);
          this.canvas.setActiveObject(triangle);
        },
        addStar() {
          const points = [];
          const outerRadius = 30;
          const innerRadius = outerRadius * 0.381966;

          for (let i = 0; i < 10; i++) {
            const radius = i % 2 === 0 ? outerRadius : innerRadius;
            const angle = (Math.PI * 2 * i) / 10 - Math.PI / 2;
            points.push({
              x: radius * Math.cos(angle),
              y: radius * Math.sin(angle),
            });
          }

          const star = new fabric.Polygon(points, {
            left: this.getCanvasCenter().x,
            top: this.getCanvasCenter().y,
            fill: "#ff0000",
            stroke: "transparent",
            strokeWidth: 0,
            strokeUniform: true,
            objectCaching: false,
            originY: "center",
          });

          this.canvas.add(star);
          this.canvas.setActiveObject(star);
          this.canvas.requestRenderAll();
        },
        addDiamond() {
          const points = [
            { x: 0, y: -40 },
            { x: 40, y: 0 },
            { x: 0, y: 40 },
            { x: -40, y: 0 },
          ];
          const diamond = new fabric.Polygon(points, {
            left: this.getCanvasCenter().x,
            top: this.getCanvasCenter().y,
            fill: "transparent",
            stroke: "#333333",
            strokeWidth: 1,
            strokeUniform: true,
            objectCaching: false,
            originX: "center",
            originY: "center",
          });
          this.canvas.add(diamond);
          this.canvas.setActiveObject(diamond);
        },
        addLine() {
          const line = new fabric.Line([0, 0, 100, 0], {
            left: this.getCanvasCenter().x,
            top: this.getCanvasCenter().y,
            stroke: "#333333",
            strokeWidth: 1,
            strokeDashArray: null,

            originX: "left",
            originY: "center",
          });
          this.canvas.add(line);
          this.canvas.setActiveObject(line);
        },
        deleteActiveObject() {
          const active = this.canvas.getActiveObjects();
          if (active.length) {
            this.canvas.discardActiveObject();
            active.forEach((obj) => this.canvas.remove(obj));
            this.canvas.requestRenderAll();
            this._updateDefaultTicketCount();
            if (this.state.mode === "preview") this.generatePreview();
          }
        },
        fitImageToCanvas() {
          const obj = this.canvas.getActiveObject();
          if (!obj || obj.type !== "image") {
            showToast("请先选择一张图片");
            return;
          }
          const targetW = this.state.ticketSize.w * MM_TO_PX;
          const targetH = this.state.ticketSize.h * MM_TO_PX;
          obj.set({
            scaleX: targetW / obj.width,
            scaleY: targetH / obj.height,
            left: targetW / 2,
            top: targetH / 2,
            originX: "center",
            originY: "center",
          });
          this.canvas.requestRenderAll();
          if (this.state.mode === "preview") this.generatePreview();
          this.saveHistory();
        },
        bindLayerControls() {
          const moveLayer = (action) => {
            const obj = this.canvas.getActiveObject();
            if (!obj) return;
            if (action === "front") this.canvas.bringToFront(obj);
            if (action === "back") this.canvas.sendToBack(obj);
            if (action === "up") this.canvas.bringForward(obj);
            if (action === "down") this.canvas.sendBackward(obj);
            this.canvas.requestRenderAll();
            if (this.state.mode === "preview") this.generatePreview();
            this.saveHistory();
          };
          document.getElementById("btn-layer-front").onclick = () => moveLayer("front");
          document.getElementById("btn-layer-back").onclick = () => moveLayer("back");
          document.getElementById("btn-layer-up").onclick = () => moveLayer("up");
          document.getElementById("btn-layer-down").onclick = () => moveLayer("down");
        },
        bindPropPanelEvents() {
          const ui = {
            panel: document.getElementById("properties-panel"),
            emptyState: document.getElementById("empty-selection-state"),
            btnDel: document.getElementById("btn-del-obj"),
            groupControls: document.getElementById("group-controls"),
            btnGroup: document.getElementById("btn-group"),
            btnUngroup: document.getElementById("btn-ungroup"),
            alignControls: document.getElementById("align-controls"),
            // ... other references ...
            x: document.getElementById("prop-x"),
            y: document.getElementById("prop-y"),
            w: document.getElementById("prop-w"),
            h: document.getElementById("prop-h"),
            angle: document.getElementById("prop-angle"),
            btnLockAspect: document.getElementById("btn-lock-aspect"),
            shapeGroup: document.getElementById("props-shape-group"),
            shapeNonLineOnly: document.querySelectorAll(".shape-non-line-only"),
            shapeRectOnly: document.querySelectorAll(".shape-rect-only"),
            shapeFill: document.getElementById("prop-shape-fill"),
            shapeFillTrans: document.getElementById("prop-shape-fill-trans"),
            shapeStroke: document.getElementById("prop-shape-stroke"),
            shapeStrokeWidth: document.getElementById("prop-shape-stroke-width"),
            shapeStrokeStyle: document.getElementById("prop-shape-stroke-style"),
            dashSettings: document.getElementById("prop-stroke-dash-settings"),
            dashLen: document.getElementById("prop-dash-len"),
            dashGap: document.getElementById("prop-dash-gap"),
            shapeRx: document.getElementById("prop-shape-rx"),
            assetGroup: document.getElementById("props-asset-group"),
            assetColor: document.getElementById("prop-asset-color"),
            imageGroup: document.getElementById("props-image-group"),
            textGroup: document.getElementById("props-text-group"),
            content: document.getElementById("prop-content"),
            family: document.getElementById("prop-font-family"),
            size: document.getElementById("prop-font-size"),
            bold: document.getElementById("prop-bold"),
            italic: document.getElementById("prop-italic"),
            underline: document.getElementById("prop-underline"),
            alignLeft: document.getElementById("align-left"),
            alignCenter: document.getElementById("align-center"),
            alignRight: document.getElementById("align-right"),
            alignJustify: document.getElementById("align-justify"),
            charSpacing: document.getElementById("prop-char-spacing"),
            lineHeight: document.getElementById("prop-line-height"),
            fill: document.getElementById("prop-fill"),
            bgColor: document.getElementById("prop-text-bg-color"),
            bgTrans: document.getElementById("prop-text-bg-transparent"),
            curvedGroup: document.getElementById("props-curved-group"),
            curvedRadius: document.getElementById("prop-curved-radius"),
            curvedAngle: document.getElementById("prop-curved-angle"),
            valCurvedRadius: document.getElementById("val-curved-radius"),
            valCurvedAngle: document.getElementById("val-curved-angle"),
            btnUpdateCurved: document.getElementById("btn-update-curved"),
            serialGroup: document.getElementById("props-serial-group"),
            sPrefix: document.getElementById("prop-ser-prefix"),
            sSuffix: document.getElementById("prop-ser-suffix"),
            sStart: document.getElementById("prop-ser-start"),
            sStep: document.getElementById("prop-ser-step"),
            sDigits: document.getElementById("prop-ser-digits"),
            sRepeat: document.getElementById("prop-ser-repeat"),
            opacity: document.getElementById("prop-opacity"),
            valOpacity: document.getElementById("val-opacity"),
          };

          // 宽高比例锁定状态
          let aspectLocked = false;
          let aspectRatio = 1;

          const debouncedUpdateCurvedText = debounce(() => {
            updateCurvedText();
          }, 300);

          const updateUI = () => {
            const obj = this.canvas.getActiveObject();
            const activeObjects = this.canvas.getActiveObjects(); // Multi-select support

            if (!obj && activeObjects.length === 0) {
              ui.panel.classList.add("d-none");
              ui.emptyState.classList.remove("d-none");
              ui.btnDel.classList.add("d-none");
              ui.groupControls.classList.add("d-none");
              ui.alignControls.classList.add("d-none");
              return;
            }

            if (ui.opacity) {
              const target = this.canvas.getActiveObject() || this.canvas.getActiveObjects()[0];
              const currentOpacity = target ? Math.round((target.opacity ?? 1) * 100) : 100;
              ui.opacity.value = currentOpacity;
              ui.valOpacity.innerText = currentOpacity + "%";
            }

            ui.panel.classList.remove("d-none");
            ui.emptyState.classList.add("d-none");

            // 选中多个对象的情况
            if (activeObjects.length > 1) {
              ui.btnDel.classList.remove("d-none");
              ui.groupControls.classList.remove("d-none");
              ui.btnGroup.classList.remove("d-none");
              ui.btnUngroup.classList.add("d-none");
              ui.alignControls.classList.remove("d-none");
              ui.shapeGroup.classList.add("d-none");
              ui.textGroup.classList.add("d-none");
              ui.imageGroup.classList.add("d-none");
              ui.serialGroup.classList.add("d-none");
              ui.assetGroup.classList.add("d-none");
              ui.curvedGroup.classList.add("d-none");
            }
            // 选中单个对象的情况
            else {
              ui.btnDel.classList.remove("d-none");
              ui.alignControls.classList.add("d-none"); // 单个不显示对齐分布

              // 编组/解组逻辑
              if (obj.type === "group") {
                ui.groupControls.classList.remove("d-none");
                ui.btnGroup.classList.add("d-none");
                ui.btnUngroup.classList.remove("d-none");
              } else {
                ui.groupControls.classList.add("d-none");
              }

              ui.x.value = (obj.left / MM_TO_PX).toFixed(1);
              ui.y.value = (obj.top / MM_TO_PX).toFixed(1);
              ui.w.value = (obj.getScaledWidth() / MM_TO_PX).toFixed(1);
              ui.h.value = (obj.getScaledHeight() / MM_TO_PX).toFixed(1);

              // 更新当前对象的宽高比例
              const currentW = parseFloat(ui.w.value);
              const currentH = parseFloat(ui.h.value);
              if (currentH > 0) {
                aspectRatio = currentW / currentH;
              }

              // 如果当前是锁定状态，应用控制点限制
              if (aspectLocked) {
                obj.setControlVisible("ml", false);
                obj.setControlVisible("mr", false);
                obj.setControlVisible("mt", false);
                obj.setControlVisible("mb", false);
              } else {
                obj.setControlVisible("ml", true);
                obj.setControlVisible("mr", true);
                obj.setControlVisible("mt", true);
                obj.setControlVisible("mb", true);
              }

              ui.angle.value = Math.round(obj.angle);

              ui.h.disabled = obj.type === "line";
              ui.shapeGroup.classList.add("d-none");
              ui.textGroup.classList.add("d-none");
              ui.serialGroup.classList.add("d-none");
              ui.assetGroup.classList.add("d-none");
              ui.imageGroup.classList.add("d-none");
              ui.curvedGroup.classList.add("d-none");

              if (obj.isAsset) {
                ui.assetGroup.classList.remove("d-none");
                ui.assetColor.value = obj.assetColor || "#000000";
              }

              if (obj.type === "image") {
                ui.imageGroup.classList.remove("d-none");
              }

              if (obj.isCurvedText) {
                ui.textGroup.classList.remove("d-none");
                ui.curvedGroup.classList.remove("d-none");
                ui.content.value = obj.curvedText || "";
                ui.curvedRadius.value = parseInt(obj.curvedRadius) || 100;
                ui.valCurvedRadius.innerText = ui.curvedRadius.value;
                ui.curvedAngle.value = obj.curvedCenterAngle || 270;
                ui.valCurvedAngle.innerText = ui.curvedAngle.value;
                ui.charSpacing.value = obj.curvedSpacing || 12;
                ui.family.value = obj.curvedFontFamily || "Microsoft YaHei";
                ui.size.value = obj.curvedFontSize || 32;
                ui.fill.value = obj.curvedFill || "#333333";
                ui.bold.checked = obj.curvedFontWeight === "bold";
                return;
              }

              const shapeTypes = ["rect", "line", "triangle", "circle", "polygon"];
              if (shapeTypes.includes(obj.type)) {
                ui.shapeGroup.classList.remove("d-none");
                ui.shapeStroke.value = obj.stroke || "#000000";
                ui.shapeStrokeWidth.value = obj.strokeWidth || 0;
                const hasDash = obj.type === "rect" || obj.type === "line";
                ui.shapeRectOnly.forEach((el) => {
                  if (hasDash) el.classList.remove("d-none");
                  else el.classList.add("d-none");
                });
                const hasFill = obj.type !== "line";
                ui.shapeNonLineOnly.forEach((el) => {
                  if (hasFill) el.classList.remove("d-none");
                  else el.classList.add("d-none");
                });
                if (hasDash) {
                  const isDashed = obj.strokeDashArray && obj.strokeDashArray.length >= 2;
                  ui.shapeStrokeStyle.value = isDashed ? "dashed" : "solid";
                  if (obj.type === "rect") {
                    if (isDashed) {
                      ui.dashSettings.classList.remove("d-none");
                      ui.dashLen.value = obj.strokeDashArray[0];
                      ui.dashGap.value = obj.strokeDashArray[1];
                    } else {
                      ui.dashSettings.classList.add("d-none");
                    }
                  }
                }
                if (hasFill) {
                  if (obj.fill && obj.fill !== "transparent") {
                    ui.shapeFill.value = obj.fill;
                    ui.shapeFillTrans.checked = false;
                  } else {
                    ui.shapeFill.value = "#ffffff";
                    ui.shapeFillTrans.checked = true;
                  }
                  if (obj.type === "rect") {
                    ui.shapeRx.value = obj.rx || 0;
                    const currentR = obj.baseRadius !== undefined ? obj.baseRadius : obj.rx * obj.scaleX;
                    ui.shapeRx.value = Math.round(currentR);
                  }
                }
              }

              if (obj.type === "i-text" || obj.type === "text" || obj.type === "textbox") {
                ui.textGroup.classList.remove("d-none");
                ui.content.value = obj.text;
                ui.family.value = obj.fontFamily;
                ui.size.value = obj.fontSize;
                ui.fill.value = obj.fill;
                ui.bold.checked = obj.fontWeight === "bold";
                ui.italic.checked = obj.fontStyle === "italic";
                ui.underline.checked = !!obj.underline;

                const alignVal = obj.textAlign || "left";
                if (alignVal === "left") ui.alignLeft.checked = true;
                else if (alignVal === "center") ui.alignCenter.checked = true;
                else if (alignVal === "right") ui.alignRight.checked = true;
                else ui.alignJustify.checked = true;

                ui.charSpacing.value = obj.charSpacing || 0;
                ui.lineHeight.value = obj.lineHeight || 1.16;

                if (obj.backgroundColor) {
                  ui.bgColor.value = obj.backgroundColor;
                  ui.bgTrans.checked = true;
                } else {
                  ui.bgColor.value = "#dddddd";
                  ui.bgTrans.checked = false;
                }

                if (obj.isSerial) {
                  ui.serialGroup.classList.remove("d-none");
                  ui.content.disabled = true;
                  const r = obj.serialRules || {};
                  ui.sPrefix.value = r.prefix;
                  ui.sSuffix.value = r.suffix;
                  ui.sStart.value = r.start;
                  ui.sStep.value = r.step;
                  ui.sDigits.value = r.digits;
                  ui.sRepeat.value = r.repeat;
                } else {
                  ui.serialGroup.classList.add("d-none");
                  ui.content.disabled = false;
                }
              }
            }
          };
          this.canvas.on("selection:created", updateUI);
          this.canvas.on("selection:updated", updateUI);
          this.canvas.on("selection:cleared", updateUI);
          this.canvas.on("object:modified", () => {
            updateUI();
            if (this.state.mode === "preview") this.generatePreview();
          });

          ui.assetColor.oninput = (e) => {
            const obj = this.canvas.getActiveObject();
            if (obj && obj.isAsset) {
              this._setAssetColor(obj, e.target.value);
              this.canvas.requestRenderAll();
              if (this.state.mode === "preview") this.generatePreview();
              this.saveHistory();
            }
          };
          const setProp = (key, val) => {
            const obj = this.canvas.getActiveObject();
            if (!obj) return;
            obj.set(key, val);
            this.canvas.requestRenderAll();
            if (this.state.mode === "preview") this.generatePreview();
            this.saveHistory();
          };
          const updateDashArray = () => {
            const style = ui.shapeStrokeStyle.value;
            if (style === "solid") {
              setProp("strokeDashArray", null);
              ui.dashSettings.classList.add("d-none");
            } else {
              const len = parseFloat(ui.dashLen.value) || 5;
              const gap = parseFloat(ui.dashGap.value) || 5;
              setProp("strokeDashArray", [len, gap]);
              ui.dashSettings.classList.remove("d-none");
            }
          };
          ui.x.oninput = (e) => setProp("left", parseFloat(e.target.value) * MM_TO_PX);
          ui.y.oninput = (e) => setProp("top", parseFloat(e.target.value) * MM_TO_PX);
          ui.opacity.oninput = (e) => {
            const val = parseInt(e.target.value) / 100; // 转成 0~1
            const obj = this.canvas.getActiveObject();
            if (!obj) return;

            const activeObjects = this.canvas.getActiveObjects();
            activeObjects.forEach((o) => {
              o.set("opacity", val);
            });

            this.canvas.requestRenderAll();
            ui.valOpacity.innerText = e.target.value + "%";

            if (this.state.mode === "preview") this.generatePreview();
            this.saveHistory();
          };

          ui.w.oninput = (e) => {
            const val = parseFloat(e.target.value);
            if (!val) return;
            const obj = this.canvas.getActiveObject();
            if (!obj) return;
            const targetW = val * MM_TO_PX;
            obj.set({ scaleX: targetW / obj.width });

            // 如果锁定了比例，同时调整高度
            if (aspectLocked && aspectRatio) {
              const newH = val / aspectRatio;
              ui.h.value = newH.toFixed(1);
              const targetH = newH * MM_TO_PX;
              obj.set({ scaleY: targetH / obj.height });
            }

            this.canvas.requestRenderAll();
            if (this.state.mode === "preview") this.generatePreview();
            this.saveHistory();
          };
          ui.h.oninput = (e) => {
            const val = parseFloat(e.target.value);
            if (!val) return;
            const obj = this.canvas.getActiveObject();
            if (!obj) return;
            const targetH = val * MM_TO_PX;
            obj.set({ scaleY: targetH / obj.height });

            // 如果锁定了比例，同时调整宽度
            if (aspectLocked && aspectRatio) {
              const newW = val * aspectRatio;
              ui.w.value = newW.toFixed(1);
              const targetW = newW * MM_TO_PX;
              obj.set({ scaleX: targetW / obj.width });
            }

            this.canvas.requestRenderAll();
            if (this.state.mode === "preview") this.generatePreview();
            this.saveHistory();
          };
          ui.angle.oninput = (e) => {
            const val = parseFloat(e.target.value);
            if (isNaN(val)) return;
            setProp("angle", val);
          };

          ui.shapeFill.oninput = (e) => setProp("fill", e.target.value);
          ui.shapeFillTrans.onchange = (e) => {
            setProp("fill", e.target.checked ? null : ui.shapeFill.value);
          };
          ui.shapeStroke.oninput = (e) => setProp("stroke", e.target.value);
          ui.shapeStrokeWidth.oninput = (e) => {
            const val = parseFloat(e.target.value);
            setProp("strokeWidth", isNaN(val) ? 0 : val);
          };
          ui.shapeStrokeStyle.onchange = updateDashArray;
          ui.dashLen.oninput = updateDashArray;
          ui.dashGap.oninput = updateDashArray;
          ui.shapeRx.oninput = (e) => {
            const val = parseInt(e.target.value) || 0;
            const obj = this.canvas.getActiveObject();
            if (!obj || obj.type !== "rect") return;
            obj.set("baseRadius", val);
            obj.set({ rx: val / obj.scaleX, ry: val / obj.scaleY });
            this.canvas.requestRenderAll();
            if (this.state.mode === "preview") this.generatePreview();
            this.saveHistory();
          };

          ui.content.oninput = (e) => {
            const obj = this.canvas.getActiveObject();
            if (obj && obj.isCurvedText) {
              debouncedUpdateCurvedText();
            } else {
              setProp("text", e.target.value);
            }
          };

          ui.family.onchange = (e) => setProp("fontFamily", e.target.value);
          ui.size.oninput = (e) => setProp("fontSize", parseInt(e.target.value));
          ui.fill.oninput = (e) => setProp("fill", e.target.value);
          ui.bold.onchange = (e) => setProp("fontWeight", e.target.checked ? "bold" : "normal");
          ui.italic.onchange = (e) => setProp("fontStyle", e.target.checked ? "italic" : "normal");
          ui.underline.onchange = (e) => setProp("underline", e.target.checked);

          [ui.alignLeft, ui.alignCenter, ui.alignRight, ui.alignJustify].forEach((btn) => {
            btn.addEventListener("change", (e) => {
              if (e.target.checked) {
                setProp("textAlign", e.target.value);
              }
            });
          });

          ui.charSpacing.oninput = (e) => {
            const val = parseInt(e.target.value);
            const obj = this.canvas.getActiveObject();
            if (obj && obj.isCurvedText) {
              debouncedUpdateCurvedText();
            } else {
              setProp("charSpacing", isNaN(val) ? 0 : val);
            }
          };

          ui.lineHeight.oninput = (e) => {
            const val = parseFloat(e.target.value);
            setProp("lineHeight", isNaN(val) ? 1.16 : val);
          };

          const updateBg = () => {
            const isTrans = ui.bgTrans.checked;
            const color = ui.bgColor.value;
            ui.bgColor.disabled = !isTrans;
            setProp("backgroundColor", !isTrans ? "" : color);
          };
          ui.bgColor.oninput = updateBg;
          ui.bgTrans.onchange = updateBg;

          const updateSerial = () => {
            const obj = this.canvas.getActiveObject();
            if (!obj || !obj.isSerial) return;
            const r = {
              prefix: ui.sPrefix.value,
              suffix: ui.sSuffix.value,
              start: parseInt(ui.sStart.value) || 1,
              step: parseInt(ui.sStep.value) || 1,
              digits: parseInt(ui.sDigits.value) || 1,
              repeat: parseInt(ui.sRepeat.value) || 1,
            };
            obj.serialRules = r;
            obj.text = this.generateSerialString(r, 0);
            ui.content.value = obj.text;
            this.canvas.requestRenderAll();
            if (this.state.mode === "preview") this.generatePreview();
            this.saveHistory();
          };
          [ui.sPrefix, ui.sSuffix, ui.sStart, ui.sStep, ui.sDigits, ui.sRepeat].forEach((el) => {
            el.addEventListener("input", debounce(updateSerial, 200));
          });

          const updateCurvedText = () => {
            const oldObj = this.canvas.getActiveObject();
            if (!oldObj || !oldObj.isCurvedText) return;

            const text = ui.content.value.trim() || " ";
            const radius = parseInt(ui.curvedRadius.value) || 100;
            const spacing = parseInt(ui.charSpacing.value) || 12;
            const centerAngle = parseInt(ui.curvedAngle.value) || 270;
            const fontSize = parseInt(ui.size.value) || 32;
            const fontFamily = ui.family.value || "Microsoft YaHei";
            const fontWeight = ui.bold.checked ? "bold" : "normal";
            const fill = ui.fill.value || "#333333";

            // 保存旧对象的变换信息
            const oldScaleX = oldObj.scaleX || 1;
            const oldScaleY = oldObj.scaleY || 1;
            const oldAngle = oldObj.angle || 0;
            const oldLeft = oldObj.left;
            const oldTop = oldObj.top;

            // 计算旧对象的圆心位置
            const oldOffset = oldObj.anchorOffset || { x: 0, y: 0 };
            const rads = fabric.util.degreesToRadians(oldAngle);
            const cos = Math.cos(rads);
            const sin = Math.sin(rads);

            const vecX = oldOffset.x * oldScaleX;
            const vecY = oldOffset.y * oldScaleY;

            const circleCenterX = oldLeft + (vecX * cos - vecY * sin);
            const circleCenterY = oldTop + (vecX * sin + vecY * cos);

            // 创建新对象
            const newObj = new CurvedText(text, {
              left: 0,
              top: 0,
              radius: radius,
              spacing: spacing,
              centerAngle: centerAngle,
              fontSize: fontSize,
              fontFamily: fontFamily,
              fontWeight: fontWeight,
              fill: fill,
            });

            // 应用相同的变换
            newObj.scaleX = oldScaleX;
            newObj.scaleY = oldScaleY;
            newObj.angle = oldAngle;

            // 计算新对象应该放置的位置以保持圆心不变
            const newOffset = newObj.anchorOffset || { x: 0, y: 0 };
            const nVecX = newOffset.x * newObj.scaleX;
            const nVecY = newOffset.y * newObj.scaleY;

            const nShiftX = nVecX * cos - nVecY * sin;
            const nShiftY = nVecX * sin + nVecY * cos;

            newObj.left = circleCenterX - nShiftX;
            newObj.top = circleCenterY - nShiftY;

            // 确保坐标正确更新
            newObj.setCoords();

            this.canvas.remove(oldObj);
            this.canvas.add(newObj);
            this.canvas.setActiveObject(newObj);
            this.canvas.requestRenderAll();
            if (this.state.mode === "preview") this.generatePreview();
            this.saveHistory();
          };

          ui.curvedRadius.oninput = (e) => {
            ui.valCurvedRadius.innerText = e.target.value;
            updateCurvedText();
          };
          ui.curvedAngle.oninput = (e) => {
            ui.valCurvedAngle.innerText = e.target.value;
            updateCurvedText();
          };

          ui.btnUpdateCurved.onclick = updateCurvedText;
          [ui.size, ui.family, ui.fill, ui.bold].forEach((el) => {
            el.addEventListener("input", debouncedUpdateCurvedText);
          });

          // 锁定宽高比例按钮
          ui.btnLockAspect.onclick = () => {
            aspectLocked = !aspectLocked;
            const icon = ui.btnLockAspect.querySelector("i");
            const obj = this.canvas.getActiveObject();

            if (aspectLocked) {
              // 锁定状态 - 显示锁定图标并高亮按钮
              icon.className = "bi bi-lock-fill";
              ui.btnLockAspect.classList.add("btn-primary");
              ui.btnLockAspect.classList.remove("border");
              ui.btnLockAspect.title = "解锁宽高比例";

              // 保存当前比例
              if (obj) {
                const currentW = parseFloat(ui.w.value);
                const currentH = parseFloat(ui.h.value);
                if (currentH > 0) {
                  aspectRatio = currentW / currentH;
                }

                // 限制只能使用四个角的控制点进行缩放
                obj.setControlVisible("ml", false); // 左中
                obj.setControlVisible("mr", false); // 右中
                obj.setControlVisible("mt", false); // 上中
                obj.setControlVisible("mb", false); // 下中

                // 四个角的控制点保持可见
                obj.setControlVisible("tl", true); // 左上
                obj.setControlVisible("tr", true); // 右上
                obj.setControlVisible("bl", true); // 左下
                obj.setControlVisible("br", true); // 右下

                this.canvas.requestRenderAll();
              }
            } else {
              // 解锁状态 - 显示解锁图标并恢复普通样式
              icon.className = "bi bi-unlock";
              ui.btnLockAspect.classList.remove("btn-primary");
              ui.btnLockAspect.classList.add("border");
              ui.btnLockAspect.title = "锁定宽高比例";

              // 恢复所有控制点
              if (obj) {
                obj.setControlVisible("ml", true);
                obj.setControlVisible("mr", true);
                obj.setControlVisible("mt", true);
                obj.setControlVisible("mb", true);
                obj.setControlVisible("tl", true);
                obj.setControlVisible("tr", true);
                obj.setControlVisible("bl", true);
                obj.setControlVisible("br", true);

                this.canvas.requestRenderAll();
              }
            }
          };

          ui.btnDel.onclick = () => this.deleteActiveObject();
        },

        generateSerialString(rules, index) {
          const logicalIndex = Math.floor(index / rules.repeat);
          const val = rules.start + logicalIndex * rules.step;
          return `${rules.prefix}${val.toString().padStart(rules.digits, "0")}${rules.suffix}`;
        },

        generatePreview() {
          const root = document.getElementById("preview-list");
          requestAnimationFrame(() => {
            this._renderPreviewDOM(root);
          });
        },

        async _renderPreviewDOM(root) {
          if (this.previewObjectUrls && this.previewObjectUrls.length > 0) {
            this.previewObjectUrls.forEach((url) => URL.revokeObjectURL(url));
            this.previewObjectUrls = [];
          }

          root.innerHTML = '<div style="padding: 40px; color: #666;"><div class="spinner-border text-primary" role="status"></div><div class="mt-2">正在渲染，请稍候...</div></div>';

          const colorInput = document.getElementById("cfg-canvas-bg");
          const sheetBgColor = colorInput.value;
          const objects = this.canvas.getObjects();
          const serialObjs = objects.filter((o) => o.isSerial);
          const hasSerials = serialObjs.length > 0;
          this.canvas.discardActiveObject();
          this.canvas.requestRenderAll();

          const { rows, cols, marginT, marginB, marginL, marginR, gapX, gapY } = this.state.layout;
          const perPage = rows * cols;
          const totalInput = document.getElementById("cfg-print-total");
          const totalTickets = parseInt(totalInput?.value) || perPage;
          const totalPages = Math.ceil(totalTickets / perPage);
          document.getElementById("preview-total-count").innerText = totalTickets;
          document.getElementById("preview-total-pages").innerText = totalPages;

          let htmlItems = [];
          const paper = this.state.paperSize;
          const ticket = this.state.ticketSize;

          const originalBg = this.canvas.backgroundColor;

          try {
            if (!hasSerials) {
              const blob = await new Promise((resolve) => this.canvas.toCanvasElement(3).toBlob(resolve));
              const url = URL.createObjectURL(blob);
              this.previewObjectUrls.push(url);
              for (let i = 0; i < totalTickets; i++) {
                htmlItems.push({ index: i, url: url });
              }
            } else {
              serialObjs.forEach((o) => (o.visible = true));
              for (let i = 0; i < totalTickets; i++) {
                serialObjs.forEach((obj) => {
                  obj.set("text", this.generateSerialString(obj.serialRules, i));
                });
                this.canvas.renderAll();
                const blob = await new Promise((resolve) => this.canvas.toCanvasElement(3).toBlob(resolve));
                const url = URL.createObjectURL(blob);
                this.previewObjectUrls.push(url);
                htmlItems.push({ index: i, url: url });
                if (i % 5 === 0) {
                  document.getElementById("preview-total-count").innerText = `渲染中 ${i + 1}/${totalTickets}`;
                }
              }
              serialObjs.forEach((obj) => {
                obj.set("text", this.generateSerialString(obj.serialRules, 0));
              });
              this.canvas.requestRenderAll();
            }
          } catch (e) {
            console.error("渲染失败", e);
            root.innerHTML = '<div class="text-danger">渲染失败: ' + e.message + "</div>";
            return;
          }

          const cssVars = `
            --pw: ${paper.w}mm; --ph: ${paper.h}mm;
            --mt: ${marginT}mm; --ml: ${marginL}mm;
            --tw: ${ticket.w}mm; --th: ${ticket.h}mm;
            --gx: ${gapX}mm; --gy: ${gapY}mm;
            --sheet-bg: ${sheetBgColor};
        `;
          const cutColor = "dashed red";
          const showCutLines = document.getElementById("cfg-show-cutlines").checked;

          let finalHtml = "";

          for (let p = 0; p < totalPages; p++) {
            let pageContent = "";
            for (let i = 0; i < perPage; i++) {
              const globalIdx = p * perPage + i;
              if (globalIdx >= htmlItems.length) break;

              const itemData = htmlItems[globalIdx];
              const r = Math.floor(i / cols);
              const c = i % cols;
              let bTop = "none",
                bBottom = "none",
                bLeft = "none",
                bRight = "none";
              if (showCutLines) {
                if (!(r === 0 && marginT === 0)) bTop = `1px ${cutColor}`;
                if (!(r === rows - 1 && marginB === 0)) bBottom = `1px ${cutColor}`;
                if (!(c === 0 && marginL === 0)) bLeft = `1px ${cutColor}`;
                if (!(c === cols - 1 && marginR === 0)) bRight = `1px ${cutColor}`;
              }

              pageContent += `
              <div class="p-item" style="
                  width: var(--tw); height: var(--th);
                  margin-right: var(--gx); margin-bottom: var(--gy);
                  border-top: ${bTop}; border-bottom: ${bBottom};
                  border-left: ${bLeft}; border-right: ${bRight};
                  position: relative;
              ">
                <img src="${itemData.url}" style="width: 100%; height: 100%; display: block;" />
              </div>
            `;
            }
            finalHtml += `<div class="p-sheet" style="${cssVars}"><div class="p-grid">${pageContent}</div></div>`;
          }

          const style = `
            <style>
                .p-sheet {
                    width: var(--pw); height: var(--ph);
                    background-color: var(--sheet-bg); 
                    margin: 0 auto 40px;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                    page-break-after: always; overflow: hidden;
                    -webkit-print-color-adjust: exact; print-color-adjust: exact;
                }
                .p-grid {
                    padding-top: var(--mt); padding-left: var(--ml);
                    display: flex; flex-wrap: wrap; align-content: flex-start;
                }
                .p-item { 
                    box-sizing: border-box; 
                    -webkit-print-color-adjust: exact; print-color-adjust: exact;
                    overflow: hidden; 
                }
                @media print {
                    body > * { display: none !important; }
                    #print-container { display: block !important; }
                    .p-sheet { box-shadow: none; margin: 0; border: none; }
                }
            </style>
        `;

          root.innerHTML = style + finalHtml;
          document.getElementById("print-container").innerHTML = style + finalHtml;
          document.getElementById("preview-total-count").innerText = totalTickets;
        },

        copy() {
          const activeObj = this.canvas.getActiveObject();
          if (!activeObj) return false;
          activeObj.clone((cloned) => {
            this.state.clipboard = cloned;
          });
          return true;
        },

        paste() {
          if (!this.state.clipboard) return false;
          this.state.clipboard.clone((clonedObj) => {
            this.canvas.discardActiveObject();

            clonedObj.set({
              left: clonedObj.left + 20,
              top: clonedObj.top + 20,
              evented: true,
            });

            if (clonedObj.type === "activeSelection") {
              clonedObj.canvas = this.canvas;
              clonedObj.forEachObject((obj) => {
                this.canvas.add(obj);
              });
              clonedObj.setCoords();
            } else {
              this.canvas.add(clonedObj);
            }
            this.canvas.setActiveObject(clonedObj);
            this.canvas.requestRenderAll();
            this.saveHistory();
          });
          return true;
        },

        saveProject() {
          this.canvas.discardActiveObject();
          this.canvas.requestRenderAll();
          const json = {
            version: "2.0",
            ...this._extractFromDOM(FORM_SCHEMA.root),
            layout: this._extractFromDOM(FORM_SCHEMA.layout),
            borderSettings: this._extractFromDOM(FORM_SCHEMA.borderSettings),
            objects: this.canvas.toJSON([
              "isSerial",
              "serialRules",
              "excludeFromExport",
              "baseRadius",
              "strokeUniform",
              "isCurvedText",
              "curvedText",
              "curvedRadius",
              "curvedSpacing",
              "curvedCenterAngle",
              "curvedFontSize",
              "curvedFontFamily",
              "curvedFontWeight",
              "curvedFill",
              "charSpacing",
              "lineHeight",
              "underline",
            ]),
          };
          const blob = new Blob([JSON.stringify(json)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `饭票设计-${new Date().toISOString().slice(0, 10)}.fpt`;
          a.click();
          URL.revokeObjectURL(url);
          showToast("项目已保存");
        },
        openProject() {
          const input = document.getElementById("file-open-project");
          input.value = "";
          input.click();
        },
        loadProject(file) {
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const json = JSON.parse(e.target.result);
              if (!json.version && !json.layout) throw new Error("无效的项目文件");
              this._applyToDOM(FORM_SCHEMA.root, json);
              this._applyToDOM(FORM_SCHEMA.layout, json.layout);
              this._applyToDOM(FORM_SCHEMA.borderSettings, json.borderSettings);
              if (document.getElementById("cfg-paper-size").value === "custom") {
                document.getElementById("custom-paper-dims").style.display = "flex";
              } else {
                document.getElementById("custom-paper-dims").style.display = "none";
              }
              if (json.backgroundColor) {
                this.canvas.backgroundColor = json.backgroundColor;
                document.getElementById("cfg-canvas-bg").value = json.backgroundColor;
              }
              this.canvas.loadFromJSON(json.objects, () => {
                const objects = this.canvas.getObjects();
                objects.forEach((obj) => {
                  obj.set({ originX: "center", originY: "center" });
                });

                this.canvas.requestRenderAll();
                this.updateLayout();
                this.saveHistory();
              });
            } catch (err) {
              console.error(err);
              showToast("加载项目失败: " + err.message);
            }
          };
          reader.readAsText(file);
        },
        exportImage() {
          if (this.state.mode !== "preview") this.generatePreview();
          const previewContainer = document.getElementById("preview-list");
          const sheets = previewContainer.querySelectorAll(".p-sheet");
          if (sheets.length === 0) {
            showToast("没有可导出的内容");
            return;
          }
          sheets.forEach((sheet, index) => {
            html2canvas(sheet, { scale: 4, useCORS: true, logging: false })
              .then((canvas) => {
                canvas.toBlob(
                  (blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `饭票导出_${index + 1}.jpg`;
                    a.click();
                    URL.revokeObjectURL(url);
                  },
                  "image/jpeg",
                  1.0,
                );
              })
              .catch((error) => {
                console.error(error);
                showToast("导出图片失败: " + error.message);
              });
          });
          showToast("图片导出已开始");
        },
        async exportPDF() {
          const { jsPDF } = window.jspdf;
          if (!jsPDF) {
            showToast("PDF库未加载");
            return;
          }
          showToast("正在生成PDF，请稍候...");
          if (this.state.mode !== "preview") this.generatePreview();
          const previewContainer = document.getElementById("preview-list");
          const sheets = previewContainer.querySelectorAll(".p-sheet");
          if (sheets.length === 0) {
            showToast("没有可导出的内容");
            return;
          }
          const doc = new jsPDF({
            orientation: this.state.paperSize.w > this.state.paperSize.h ? "l" : "p",
            unit: "mm",
            format: [this.state.paperSize.w, this.state.paperSize.h],
          });
          try {
            for (let i = 0; i < sheets.length; i++) {
              const sheet = sheets[i];
              const originalTransform = sheet.style.transform;
              sheet.style.transform = "none";
              const canvas = await html2canvas(sheet, { scale: 4, useCORS: true, logging: false });
              sheet.style.transform = originalTransform;
              const imgData = canvas.toDataURL("image/jpeg", 1.0);
              if (i > 0) doc.addPage();
              doc.addImage(imgData, "JPEG", 0, 0, this.state.paperSize.w, this.state.paperSize.h);
            }
            const fileName = `饭票导出_${new Date().toISOString().slice(0, 19).replace(/[-T:]/g, "")}.pdf`;
            doc.save(fileName);
            showToast("PDF导出成功");
          } catch (error) {
            console.error(error);
            showToast("导出PDF失败: " + error.message);
          }
        },
      };
      window.onload = () => App.init();
      document.getElementById("file-open-project").addEventListener("change", (e) => {
        App.loadProject(e.target.files[0]);
      });
    </script>
  </body>
</html>
